<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GDOU Net Login</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --line: #d9e2ec;
        --text: #122033;
        --muted: #607086;
        --primary: #2563eb;
        --primary-weak: #e8f0ff;
        --success: #166534;
        --success-weak: #dcfce7;
        --danger: #b91c1c;
        --danger-weak: #fee2e2;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg, #f8fbff 0%, #f4f7fb 100%);
        color: var(--text);
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 28px 20px 32px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        overflow: hidden;
      }
      .bar {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      h1 {
        margin: 0;
        font-size: 18px;
      }
      .body {
        padding: 18px 18px 20px;
      }
      .title {
        margin: 0 0 6px;
        font-size: 28px;
        line-height: 1.2;
      }
      .sub {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 18px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      label {
        font-size: 13px;
        font-weight: 600;
      }
      input, button {
        font: inherit;
      }
      input {
        width: 100%;
        height: 42px;
        border-radius: 10px;
        border: 1px solid #cfd8e3;
        padding: 0 12px;
        background: #fff;
        color: var(--text);
        outline: none;
      }
      input:focus {
        border-color: #7da2ff;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }
      .full {
        grid-column: 1 / -1;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 16px;
      }
      .spacer {
        flex: 1;
      }
      button {
        border: 1px solid transparent;
        border-radius: 10px;
        height: 40px;
        padding: 0 14px;
        cursor: pointer;
        transition: transform 0.04s ease, background 0.15s ease, border-color 0.15s ease;
      }
      button:active { transform: translateY(1px); }
      .primary {
        background: var(--primary);
        color: #fff;
      }
      .soft {
        background: var(--primary-weak);
        color: #1e40af;
        border-color: #bfdbfe;
      }
      .neutral {
        background: #fff;
        color: #334155;
        border-color: #cbd5e1;
      }
      .danger {
        background: var(--danger-weak);
        color: var(--danger);
        border-color: #fecaca;
      }
      .check {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        border: 1px solid var(--line);
        background: #f8fafc;
        color: #475569;
      }
      .pill.online {
        background: var(--success-weak);
        border-color: #86efac;
        color: var(--success);
      }
      .pill.offline {
        background: var(--danger-weak);
        border-color: #fca5a5;
        color: var(--danger);
      }
      .status {
        margin-top: 16px;
        padding: 12px 14px;
        border-radius: 10px;
        background: #f8fafc;
        border: 1px solid var(--line);
        color: #526174;
        min-height: 48px;
        white-space: pre-wrap;
      }
      .advanced {
        margin-top: 14px;
        border-top: 1px solid var(--line);
        padding-top: 14px;
      }
      details summary {
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        color: #334155;
      }
      @media (max-width: 720px) {
        .grid { grid-template-columns: 1fr; }
        .wrap { padding: 12px; }
        .title { font-size: 24px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="bar">
          <h1>GDOU Net Login</h1>
          <span id="badge" class="pill">Idle</span>
        </div>
        <div class="body">
          <h2 class="title">校园网登录与自动重连</h2>
          <p class="sub">这里直接输入账号密码，保存后可手动登录，也可以让程序在断网后自动重连。</p>

          <div class="grid">
            <div class="field">
              <label for="username">账号</label>
              <input id="username" autocomplete="username" placeholder="学号 / 账号" />
            </div>
            <div class="field">
              <label for="password">密码</label>
              <input id="password" type="password" autocomplete="current-password" placeholder="校园网密码" />
            </div>
            <div class="field">
              <label for="portal_url">Portal 地址</label>
              <input id="portal_url" value="http://10.129.1.1" />
            </div>
            <div class="field">
              <label for="probe_url">探测地址</label>
              <input id="probe_url" value="http://connectivitycheck.gstatic.com/generate_204" />
            </div>
            <div class="field">
              <label for="ac_id">ac_id</label>
              <input id="ac_id" placeholder="可留空自动获取" />
            </div>
            <div class="field">
              <label for="retry_seconds">重试间隔(秒)</label>
              <input id="retry_seconds" type="number" min="5" max="3600" value="30" />
            </div>
          </div>

          <div class="check">
            <label><input id="auto_query_acid" type="checkbox" checked /> 自动获取 ac_id</label>
            <label><input id="auto_reconnect" type="checkbox" /> 自动重连</label>
            <label><input id="show_password" type="checkbox" /> 显示密码</label>
            <span class="spacer"></span>
            <span id="online_state" class="pill">Unknown</span>
          </div>

          <details class="advanced">
            <summary>高级设置</summary>
            <div class="grid" style="margin-top: 12px;">
              <div class="field">
                <label for="os_name">OS 名称</label>
                <input id="os_name" />
              </div>
              <div class="field">
                <label for="device_name">设备名称</label>
                <input id="device_name" />
              </div>
              <div class="field">
                <label for="n">n</label>
                <input id="n" type="number" min="1" value="200" />
              </div>
              <div class="field">
                <label for="login_type">type</label>
                <input id="login_type" type="number" min="1" value="1" />
              </div>
            </div>
          </details>

          <div class="row">
            <button class="primary" id="login">登录</button>
            <button class="neutral" id="save">保存</button>
            <button class="soft" id="status">检查状态</button>
            <button class="danger" id="logout">退出</button>
          </div>

          <div id="status_text" class="status">Ready</div>
        </div>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
