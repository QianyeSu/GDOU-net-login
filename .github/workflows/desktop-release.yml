name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to update
        required: true
        default: desktop-v0.1.1
  push:
    tags:
      - "desktop-v*"

jobs:
  windows:
    name: Windows installers
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Windows installers
        working-directory: desktop
        run: ../frontend/node_modules/.bin/tauri build --target x86_64-pc-windows-msvc

      - name: Collect release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-assets | Out-Null
          Copy-Item "desktop/target/x86_64-pc-windows-msvc/release/gdou-net-login.exe" "release-assets/gdou-net-login-windows-x86_64.exe"
          Copy-Item "desktop/target/x86_64-pc-windows-msvc/release/bundle/nsis/*setup.exe" "release-assets/"
          Copy-Item "desktop/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi" "release-assets/"
          Get-ChildItem release-assets -File | Get-FileHash -Algorithm SHA256 | ForEach-Object {
            "$($_.Hash)  $(Split-Path $_.Path -Leaf)"
          } | Set-Content "release-assets/SHA256SUMS.txt"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: gdou-net-login-windows-x86_64
          path: release-assets/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: release-assets/*
          overwrite_files: true
          body: |
            ## 下载

            | 平台 | 文件 | 说明 |
            | --- | --- | --- |
            | Windows x64 | `GDOU Net Login_*_x64-setup.exe` | 推荐，普通安装包 |
            | Windows x64 | `GDOU Net Login_*_x64_en-US.msi` | 适合批量部署或偏好 MSI 的用户 |
            | Windows x64 | `gdou-net-login-windows-x86_64.exe` | 免安装直接运行 |

            ## 校验

            下载后可使用 `SHA256SUMS.txt` 校验文件完整性。

            ## 说明

            - 本版本用于广东海洋大学校园网登录与自动重连。
            - 0.1.1 仅发布 Windows x64 版本。
            - Windows 安装包暂未做代码签名，首次运行时可能出现系统安全提醒。

            ## 主要变化

            - 桌面端支持登录、断开、状态检测和自动重连。
            - 支持系统托盘，右键可显示主窗口、打开 GitHub、检查更新和退出。
            - 支持 Skyborn 浅蓝、默认白色和暗色主题。
